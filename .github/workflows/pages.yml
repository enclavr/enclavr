name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - .gitmodules
      - docs/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Docs
        run: |
          if [ -d "docs" ]; then
            echo "Using root docs folder"
          elif [ -d "frontend/docs" ]; then
            echo "Using frontend/docs"
          else
            echo "No docs folder found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
