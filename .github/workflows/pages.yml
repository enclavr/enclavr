name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - .gitmodules
      - docs/**
  workflow_dispatch:
  repository_dispatch:
    types: [docs_updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Docs
        run: |
          if [ -d "docs/_site" ]; then
            echo "Docs already built"
          else
            echo "Docs directory exists but not built - skipping Jekyll build"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
