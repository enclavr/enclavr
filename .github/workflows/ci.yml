name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate YAML syntax
        run: |
          pip install yamllint
          yamllint -d relaxed .github/

      - name: Validate script syntax
        run: bash -n script/main.sh

      - name: Validate required files
        run: |
          test -f AGENTS.md && echo "AGENTS.md present"
          test -f README.md && echo "README.md present"
          test -f LICENSE && echo "LICENSE present"
          test -f script/main.sh && echo "script/main.sh present"
